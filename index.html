<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prediction View Finance Solution</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f2f4f8;
      margin: 0;
      padding: 0;
    }

    .navbar {
      background-color: #4A90E2;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      width: 100%;
      box-sizing: border-box;
    }

    .navbar h1 {
      margin: 0;
      font-size: 20px;
    }

    .menu-icon {
      font-size: 24px;
      cursor: pointer;
    }

    .nav-links {
      position: fixed;
      top: 0;
      right: -260px;
      width: 250px;
      height: 100%;
      background-color: #4A90E2;
      display: flex;
      flex-direction: column;
      padding-top: 60px;
      transition: right 0.3s ease-in-out;
      z-index: 999;
    }

    .nav-links.show {
      right: 0;
    }

    .nav-links a {
      color: white;
      padding: 15px 20px;
      text-decoration: none;
      font-size: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .nav-links a:hover,
    .nav-links a.active {
      background-color: rgba(255,255,255,0.2);
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 22px;
      cursor: pointer;
      color: white;
    }

    .container {
      background: white;
      padding: 25px 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 40px auto;
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
      color: #333;
      font-size: 22px;
    }

    .license-status {
      font-size: 14px;
      margin-bottom: 20px;
      color: #ff0000;
    }

    input[type="number"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #888;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #888;
    }    

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background-color: #4A90E2;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .result {
      margin-top: 20px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s ease;
    }

    .result.show {
      opacity: 1;
      transform: translateY(0);
    }

    .result-box, .pairs-box {
      background: #e8f0fe;
      padding: 15px;
      border-radius: 10px;
      font-size: 17px;
      color: #333;
      margin-bottom: 10px;
      text-align: left;
    }
        /* Footer */
    .footer {
      background-color: #4A90E2;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: auto;
    }

    .footer p {
      margin: 5px 0;
      font-size: 14px;
    }


    @media (max-width: 480px) {
      .container {
        padding: 20px 15px;
      }

      h2 {
        font-size: 20px;
      }

      .result-box, .pairs-box {
        font-size: 15px;
      }

      button, input[type="number"] {
        font-size: 15px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- ✅ Navbar -->
  <div class="navbar">
    <h1>Prediction View Option Trading Solutions</h1>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
  </div>



  <div class="nav-links" id="navLinks">
    <div class="close-btn" onclick="toggleMenu()">✖</div>

    <a href="#" onclick="showLicense()">License Activation</a>

  <div class="container">
    <h2>License Information</h2>
    <p >Enter License Key to activate . Use provider license key to activate Option Trading tool </p>
    <form id="licenseActivationForm">
      <input type="text" id="ActivationKey" placeholder="Enter Activation key " required>
      <button onclick="activateLicense()">Activate</button>
    </form><br>    
    <button onclick="closeLicense()">Close</button>
  </div>

  <div class="container">
    <h2>Option Software</h2>
    <div class="license-status" id="licenseStatus"></div>

      <input type="text" id="numberInput_IndexName" placeholder="Index name or equity F and O or crude oil f and o  " required>

      <input type="number" id="numberInput" placeholder="Enter price" required>
      <button type="submit" id="submitBtn">Generate</button>
    </form>

    <div class="result" id="result">
      <div class="result-box" id="resultBox1"></div>
      <div class="result-box" id="resultBox2"></div>
      <div class="pairs-box" id="pairBox"></div>
    </div>
  </div>

// do asynchronous work before running, increment this and
// decrement it. Incrementing must happen in a place like
// Module.preRun (used by emcc to add file preloading).
// Note that you can add dependencies in preRun, even though
// it happens right before run - run will be postponed until
// the dependencies are met.
var runDependencies = 0;
var dependenciesFulfilled = null; // overridden to take different actions when all run dependencies are fulfilled
var runDependencyTracking = {};
var runDependencyWatcher = null;

function addRunDependency(id) {
  runDependencies++;

  Module['monitorRunDependencies']?.(runDependencies);

  assert(id, 'addRunDependency requires an ID')
  assert(!runDependencyTracking[id]);
  runDependencyTracking[id] = 1;
  if (runDependencyWatcher === null && typeof setInterval != 'undefined') {
    // Check for missing dependencies every few seconds
    runDependencyWatcher = setInterval(() => {
      if (ABORT) {
        clearInterval(runDependencyWatcher);
        runDependencyWatcher = null;
        return;
      }
      var shown = false;
      for (var dep in runDependencyTracking) {
        if (!shown) {
          shown = true;
          err('still waiting on run dependencies:');
        }
        err(`dependency: ${dep}`);
      }
      if (shown) {
        err('(end of list)');
      }
    }, 10000);
    // Prevent this timer from keeping the runtime alive if nothing
    // else is.
    runDependencyWatcher.unref?.()
  }
}

function removeRunDependency(id) {
  runDependencies--;

  Module['monitorRunDependencies']?.(runDependencies);

  assert(id, 'removeRunDependency requires an ID');
  assert(runDependencyTracking[id]);
  delete runDependencyTracking[id];
  if (runDependencies == 0) {
    if (runDependencyWatcher !== null) {
      clearInterval(runDependencyWatcher);
      runDependencyWatcher = null;
    }
    if (dependenciesFulfilled) {
      var callback = dependenciesFulfilled;
      dependenciesFulfilled = null;

/** @param {string|number=} what */
function abort(what) {
  Module['onAbort']?.(what);

  what = 'Aborted(' + what + ')';
  // TODO(sbc): Should we remove printing and leave it up to whoever
  // catches the exception?
  err(what);

  ABORT = true;

  // Use a wasm runtime error, because a JS error might be seen as a foreign
  // exception, which means we'd run destructors on it. We need the error to
  // simply make the program stop.
  // FIXME This approach does not work in Wasm EH because it currently does not assume
  // all RuntimeErrors are from traps; it decides whether a RuntimeError is from
  // a trap or not based on a hidden field within the object. So at the moment
  // we don't have a way of throwing a wasm trap from JS. TODO Make a JS API that
  // allows this in the wasm spec.

  // Suppress closure compiler warning here. Closure compiler's builtin extern
  // definition for WebAssembly.RuntimeError claims it takes no arguments even
  // though it can.
  // TODO(https://github.com/google/closure-compiler/pull/3913): Remove if/when upstream closure gets fixed.
  /** @suppress {checkTypes} */
  var e = new WebAssembly.RuntimeError(what);

  // in code paths apart from instantiation where an exception is expected
  // to be thrown when abort is called.
  throw e;

function createExportWrapper(name, nargs) {
  return (...args) => {
    assert(runtimeInitialized, `native function \`${name}\` called before runtime initialization`);
    var f = wasmExports[name];
    assert(f, `exported native function \`${name}\` not found`);
    // Only assert for too many arguments. Too few can be valid since the missing arguments will be zero filled.
    assert(args.length <= nargs, `native function \`${name}\` called with ${args.length} args but expects ${nargs}`);
    return f(...args);
  };
}
